<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Statisti-Kal - מחשבוני סטטיסטיקה אקדמיים בעברית">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F9F9F6"/>
      <stop offset="1" stop-color="#EFEAD8"/>
    </linearGradient>
    <radialGradient id="glowBrass" cx="0.18" cy="0.85" r="0.55">
      <stop offset="0" stop-color="#D4A843" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#D4A843" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCobalt" cx="0.85" cy="0.15" r="0.5">
      <stop offset="0" stop-color="#4361EE" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#4361EE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="curveFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D4A843" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#4361EE" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="titleAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4361EE"/>
      <stop offset="1" stop-color="#D4A843"/>
    </linearGradient>
    <style>
      .serif { font-family: 'Playfair Display', 'Times New Roman', serif; }
      .sans { font-family: 'Assistant', 'Noto Sans Hebrew', 'David', 'Arial Hebrew', sans-serif; }
      .mono { font-family: 'Geist Mono', 'Courier New', monospace; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowBrass)"/>
  <rect width="1200" height="630" fill="url(#glowCobalt)"/>

  <g class="serif">
    <text x="1110" y="86" font-size="46" font-weight="700" fill="#1A1A1A" text-anchor="end">Statisti<tspan fill="#D4A843">-Kal</tspan></text>
  </g>

  <g class="sans">
    <text x="80" y="78" font-size="26" font-weight="700" fill="#4361EE">סטטיסטיקה אקדמית בעברית</text>
    <line x1="80" y1="92" x2="380" y2="92" stroke="#4361EE" stroke-width="2" stroke-linecap="round"/>
  </g>

  <g transform="translate(600 380)">
    <line x1="-340" y1="0" x2="340" y2="0" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
    <g stroke="#1A1A1A" stroke-width="1.5">
      <line x1="-260" y1="0" x2="-260" y2="8"/>
      <line x1="-130" y1="0" x2="-130" y2="8"/>
      <line x1="0" y1="0" x2="0" y2="10"/>
      <line x1="130" y1="0" x2="130" y2="8"/>
      <line x1="260" y1="0" x2="260" y2="8"/>
    </g>
    <path d="M -260 0 C -260 0, -340 -2, -340 0 Z" fill="#EF4444" fill-opacity="0.10"/>
    <path d="M 260 0 C 260 0, 340 -2, 340 0 Z" fill="#EF4444" fill-opacity="0.10"/>
    <path d="M -340 0 C -300 0, -260 -160, -200 -220 C -100 -280, 0 -290, 100 -260 C 200 -220, 280 -90, 340 0 Z" fill="url(#curveFill)"/>
    <path d="M -340 0 C -300 0, -260 -160, -200 -220 C -100 -280, 0 -290, 100 -260 C 200 -220, 280 -90, 340 0" fill="none" stroke="#D4A843" stroke-width="6" stroke-linecap="round"/>
    <circle cx="0" cy="-290" r="9" fill="#4361EE"/>
    <text x="0" y="44" class="serif" font-size="26" font-weight="700" fill="#1A1A1A" text-anchor="middle" font-style="italic">μ</text>
    <text x="-260" y="34" class="sans" font-size="20" font-weight="600" fill="#4A4A4A" text-anchor="middle">μ−σ</text>
    <text x="260" y="34" class="sans" font-size="20" font-weight="600" fill="#4A4A4A" text-anchor="middle">μ+σ</text>
  </g>

  <g class="sans">
    <text x="1110" y="510" font-size="34" font-weight="800" fill="#1A1A1A" text-anchor="end">מחשבונים, שלב-אחרי-שלב,</text>
    <text x="1110" y="548" font-size="34" font-weight="800" fill="url(#titleAccent)" text-anchor="end">לסטטיסטיקה אקדמית</text>
    <text x="1110" y="588" font-size="20" font-weight="500" fill="#4A4A4A" text-anchor="end">הסתברויות  ·  התפלגות נורמלית  ·  בדיקת השערות  ·  רגרסיה</text>
  </g>

  <g>
    <text x="80" y="588" class="mono" font-size="22" font-weight="700" fill="#4361EE">statisti-kal.com</text>
    <text x="80" y="612" class="sans" font-size="14" font-weight="500" fill="#4A4A4A">חינם לסטודנטים · קוד פתוח · רץ בדפדפן</text>
  </g>
</svg>
